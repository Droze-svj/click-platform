# Render.com Configuration File
# This file automatically configures your Render.com service with the correct settings

services:
  - type: web
    name: sovereign-platform
    env: node
    region: oregon # Change to your preferred region: oregon, frankfurt, singapore, mumbai, sydney
    buildCommand: 'export NODE_OPTIONS="--max-old-space-size=2048" && NEXT_TELEMETRY_DISABLED=1 pnpm install && pnpm prisma:generate && pnpm build'
    startCommand: 'NODE_OPTIONS="--max-old-space-size=2048" NODE_ENV=production node server/index.js'
    
    
    healthCheckPath: /
    envVars:
      - key: SENTRY_DSN
        value: https://a400da46f531219b7ce6f78a9d5cb6ff@o4510623214731264.ingest.de.sentry.io/4510629716033616
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: FRONTEND_URL
        value: https://sovereign-platform.onrender.com
      # Add your other environment variables in Render.com dashboard
      # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, JWT_SECRET, etc.
