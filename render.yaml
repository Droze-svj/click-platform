# Render.com Configuration File
#
# Uses `env: docker` so Render builds from ./Dockerfile (debian-bookworm with
# the full GPL ffmpeg). Previous setup used the node buildpack which gave a
# stripped ffmpeg and broke auto-edit at runtime ("Filter not found" 500s).
#
# Trade-off: Docker builds are ~3-5 min slower than buildpack but eliminate a
# whole class of production failures. The Dockerfile fails fast if ffmpeg is
# missing required filters, so a missing-filter regression surfaces at deploy
# time, not during a real user's render.

services:
  - type: web
    name: sovereign-platform
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    # Liveness probe only — /api/health is a DEEP readiness check that returns
    # 503 if Mongo/Redis/Supabase has any transient blip, which would make Render
    # kill a healthy instance. /api/health/light always returns 200 if the
    # process is up. Use /api/health for monitoring, not for the platform probe.
    healthCheckPath: /api/health/light
    envVars:
      - key: SENTRY_DSN
        value: https://a400da46f531219b7ce6f78a9d5cb6ff@o4510623214731264.ingest.de.sentry.io/4510629716033616
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: FRONTEND_URL
        value: https://sovereign-platform.onrender.com
      - key: APP_URL
        value: https://sovereign-platform.onrender.com
      - key: PORT
        value: "5001"
      # Beta: auto-verify new accounts so a missing email provider can't lock
      # testers out of the dashboard. Set to "false"/unset for public launch.
      - key: AUTO_VERIFY_EMAIL
        value: "true"
      # Gemini key — the code reads GOOGLE_AI_API_KEY (GEMINI_API_KEY below is
      # legacy/unused). Without this, AI features fall back to heuristics.
      - key: GOOGLE_AI_API_KEY
        sync: false
      # Encrypts stored OAuth tokens. MUST be set — defaults to a known insecure
      # constant otherwise. Use a random 32+ char string.
      - key: OAUTH_ENCRYPTION_KEY
        sync: false
      # Cloudinary media storage — without these, uploads/exports go to Render's
      # ephemeral disk and vanish on every restart/redeploy.
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: WHOP_API_KEY
        sync: false
      - key: WHOP_WEBHOOK_SECRET
        sync: false
      - key: WHOP_PRODUCT_ID_CREATOR_MONTHLY
        sync: false
      - key: WHOP_PRODUCT_ID_CREATOR_YEARLY
        sync: false
      - key: WHOP_PRODUCT_ID_PRO_MONTHLY
        sync: false
