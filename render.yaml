# Render.com Configuration File
# This file automatically configures your Render.com service with the correct settings

services:
  - type: web
    name: sovereign-platform
    env: node
    region: oregon # Change to your preferred region: oregon, frankfurt, singapore, mumbai, sydney
    plan: free
    buildCommand: "export NODE_OPTIONS='--max-old-space-size=4096' && npm install --no-audit --no-fund && npx prisma generate && npm run build --workspace=client"
    startCommand: "NODE_ENV=production node server/index.js"
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://sovereign-platform.onrender.com
      # Add your other environment variables in Render.com dashboard
      # SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, JWT_SECRET, etc.
