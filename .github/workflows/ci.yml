name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd client && npm ci

    - name: Generate Prisma Client
      run: npm run prisma:generate

    - name: Run linter
      run: npm run lint

    - name: Typecheck client
      run: npm run typecheck

    - name: Test client
      # Client jest (jsdom RTL + util suites). Gated: it runs no network/DB, so it
      # must stay green. (Previously only `tsc` ran here, letting two util suites
      # rot unnoticed — see PR #218.)
      run: cd client && npm test -- --ci --watchAll=false

    - name: Run unit tests
      run: npm run test:unit
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/click-test
        JWT_SECRET: test-secret-key
        REDIS_URL: redis://localhost:6379

    - name: Run integration tests
      # GATING. The mongoose connection-race that made this informational was
      # resolved by setup.js's per-worker DB split + 60s buffer + connected-event
      # wait; the last real failure (a stale subscription/verify 403 assertion) is
      # fixed. All 15 integration suites pass against the CI mongo service.
      run: npm run test:integration
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/click-test
        JWT_SECRET: test-secret-key
        REDIS_URL: redis://localhost:6379

    - name: Generate test coverage
      # Informational. `jest --coverage` runs at the ROOT config (no
      # --selectProjects), so it matches every *.test.js under one config and the
      # client/e2e suites fail in the wrong environment (collapses to 0%). That's a
      # coverage-tooling config issue, independent of the now-gating unit +
      # integration + security projects; kept non-gating until the coverage config
      # is reworked to run per-project.
      continue-on-error: true
      run: npm run test:coverage
      env:
        NODE_ENV: test
        MONGODB_URI: mongodb://localhost:27017/click-test
        JWT_SECRET: test-secret-key

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: |
        npm ci
        cd client && npm ci

    - name: Generate Prisma Client
      run: npm run prisma:generate

    - name: Build frontend
      run: npm run build
      env:
        NODE_ENV: production

    - name: Build Docker image
      run: docker build -t click:latest .

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # test:security boots the app + hits the DB; without a mongo service every
    # security suite failed with ECONNREFUSED (the job set a localhost MONGODB_URI
    # but provided no server). Mirror the `test` job's services. Redis stays
    # optional (caching degrades gracefully) but is provided for parity.
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Generate Prisma Client
      run: npm run prisma:generate

    # Fail if a real .env or key material was ever committed (the highest-leverage
    # leak guardrail — local pre-commit hooks can be skipped, CI can't).
    - name: Scan for committed secrets
      run: node scripts/check-secrets.js

    # Runtime deps are clean at high/critical (all prior highs fixed via direct
    # bumps + overrides — see docs/security-debt.md). Gate at high so no new
    # high/critical advisory can merge unnoticed. The 4 remaining moderates need
    # major bumps and are documented/accepted in docs/security-debt.md.
    - name: Run security audit
      run: npm audit --omit=dev --audit-level=high

    - name: Run security tests
      run: npm run test:security
      env:
        NODE_ENV: test
        JWT_SECRET: test-secret-key-for-ci-only-not-used-in-prod
        MONGODB_URI: mongodb://localhost:27017/click-test
        REDIS_URL: redis://localhost:6379
