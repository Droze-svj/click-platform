name: Deploy to Production

# Manual-trigger only. Legacy Docker→GHCR + self-hosted SSH deploy. Click's
# primary production deploy is Render (backend, native) + Vercel (frontend);
# this is an opt-in fallback. It does NOT run on push, and the deploy job aborts
# cleanly if the SSH secrets are not configured.
#
# Required secrets to actually deploy (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY, SSH_USER, SSH_HOST, PRODUCTION_DOMAIN
#   (TEST_MONGODB_URI for the test job; SLACK_WEBHOOK_URL optional)
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci
          cd client && npm ci
      
      - name: Run tests
        run: |
          npm run test:unit
          npm run test:integration
        env:
          NODE_ENV: test
          MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
          JWT_SECRET: test-secret
      
      - name: Build
        run: |
          cd client && npm run build

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: [test, build]
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://${{ secrets.PRODUCTION_DOMAIN }}
    env:
      # Job-level so the notify step's `if: env.SLACK_WEBHOOK_URL != ''` guard works.
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Verify required secrets
        run: |
          missing=""
          for s in SSH_PRIVATE_KEY SSH_USER SSH_HOST; do
            if [ -z "${!s}" ]; then missing="$missing $s"; fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Self-hosted deploy is not configured. Missing secrets:$missing"
            echo "::error::Set them under Settings → Secrets and variables → Actions, or rely on Render/Vercel native deploys."
            exit 1
          fi
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd /var/www/click
            
            # Pull latest code
            git fetch origin
            git reset --hard origin/main
            
            # Backup current version
            if [ -d "current" ]; then
              cp -r current previous
              cp .env current/.env.backup 2>/dev/null || true
            fi
            
            # Create new deployment
            mkdir -p releases
            RELEASE_DIR="releases/$(date +%Y%m%d_%H%M%S)"
            cp -r . $RELEASE_DIR
            
            # Install dependencies
            cd $RELEASE_DIR
            npm ci --production
            cd client && npm ci && npm run build && cd ..
            
            # Run migrations
            node scripts/migrate-database.js
            
            # Create backup
            node scripts/backup-database.js
            
            # Switch to new version
            rm -rf current
            ln -s $RELEASE_DIR current
            
            # Restart application
            pm2 reload ecosystem.config.js --env production
            
            # Health check
            sleep 10
            curl -f http://localhost:5001/api/health || exit 1
            
            # Cleanup old releases (keep last 5)
            cd releases
            ls -t | tail -n +6 | xargs rm -rf
          EOF
      
      - name: Notify deployment
        if: ${{ always() && env.SLACK_WEBHOOK_URL != '' }}
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Deployment to ${{ github.event.inputs.environment || 'production' }}: ${{ job.status }}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}



